<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto - FATEC</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #333; margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #27ae60; outline: none; }

        .error-message {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 5px;
            display: block;
            font-weight: 500;
        }

        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background: #219150; }

        .cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
        .cancel:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <h2>Novo Produto</h2>

    <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">

        <input type="hidden" th:field="*{idProduto}">

        <div class="form-group">
            <label for="nome">Nome do Produto</label>
            <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: Smartphone" required>
            <span class="error-message" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>

        <div class="form-group">
            <label for="valor">Preço (R$)</label>
            <input type="number" id="valor" step="0.01" th:field="*{valor}" placeholder="0.00" required>
            <span class="error-message" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></span>
        </div>

        <button type="submit">Cadastrar agora</button>
        <a th:href="@{/produtos}" class="cancel">Cancelar e voltar</a>
    </form>
</div>

</body>
</html>
