<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #3498db; color: white; }
        .btn { padding: 6px 12px; text-decoration: none; border-radius: 4px; color: white; }
        .btn-add { background: #27ae60; }
        .btn-edit { background: #3498db; }
        .btn-del { background: #e74c3c; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Produtos</h1>
        <a href="/produtos/novo" class="btn btn-add">Novo Produto</a>
    </div>

    <form th:action="@{/produtos}" method="get" class="search-box">
        <input type="text" name="nome" th:value="${nomeFiltro}" placeholder="Filtrar por nome...">
        <button type="submit">Buscar</button>
        <a th:href="@{/produtos}" style="text-decoration:none; color:#666; line-height:35px;">Limpar</a>
    </form>

    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Valor</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${produtos}">
            <td th:text="${p.nome}"></td>
            <td th:text="${'R$ ' + p.valor}"></td>
            <td>
                <a th:href="@{/produtos/editar/{id}(id=${p.idProduto})}" class="btn btn-edit">Editar</a>
                <a th:href="@{/produtos/excluir/{id}(id=${p.idProduto})}" class="btn btn-del" onclick="return confirm('Excluir?')">Remover</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
