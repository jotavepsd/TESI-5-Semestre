<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto - FATEC</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
        }
        .form-group { margin-bottom: 22px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #e67e22;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }
        .error-message {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 6px;
            display: block;
            font-weight: 500;
        }
        button {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }
        .cancel {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .cancel:hover {
            color: #2c3e50;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <h2> Editar Produto</h2>

    <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">

        <input type="hidden" th:field="*{idProduto}">

        <div class="form-group">
            <label for="nome"> Nome do Produto</label>
            <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: Smartphone Galaxy S24" required>
            <span class="error-message" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>

        <div class="form-group">
            <label for="valor"> Preço (R$)</label>
            <input type="number" id="valor" step="0.01" min="0.01" th:field="*{valor}" placeholder="0.00" required>
            <span class="error-message" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></span>
        </div>

        <button type="submit"> Atualizar Produto</button>
        <a th:href="@{/produtos}" class="cancel">← Cancelar e voltar para lista</a>
    </form>
</div>

</body>
</html>
